# PharmaOS CI — the same gates we run locally, on every push/PR.
#
# Jobs (mirroring the original Phase-0 design, updated for M1..M11):
#   js         — prettier format:check, eslint, tsc, turbo build (Node 22, pnpm 10)
#   python     — ruff / black / mypy (strict) / pytest against PostgreSQL 17
#                with the REAL migrations applied first (no mocked schema)
#   migrations — up/down/re-up reversibility gate, RBAC-seed freshness
#                (code is the source: packages/shared/permissions.ts),
#                and idempotent double-apply
#
# NOTE: this file is added via the GitHub web UI (the integration used for
# pushes lacks the Workflows permission).

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS — format / lint / typecheck / build (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The desktop build is tsc-only; the Electron binary is never executed in CI.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from "packageManager" in package.json (pnpm@10.x).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  python:
    name: Python — ruff / black / mypy / pytest (PostgreSQL 17)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pharmaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pharmaos_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      # The ubuntu runner ships pg_dump/pg_restore 16, but the service DB is 17 —
      # pg_dump refuses to dump a NEWER server (the backup_service tests fail with
      # "server version mismatch"). Install the PGDG client 17 and put it first on
      # PATH so pg_dump/pg_restore/psql all match the PostgreSQL 17 server.
      - name: Match PostgreSQL client to the 17 server (backup pg_dump/pg_restore)
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests
      - run: python -m black --check src tests
      - run: python -m mypy src
      - name: Apply migrations + code-defined seeds (real schema for the suite)
        working-directory: .
        run: DATABASE_URL="$TEST_DATABASE_URL" bash packages/db/scripts/apply-migrations.sh
      - name: pytest (full suite against the migrated database)
        run: python -m pytest tests

  migrations:
    name: Migrations — up/down/re-up · seed freshness · idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pharmaos_updown
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pharmaos_updown
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: RBAC seed freshness (regenerate from permissions.ts — no drift allowed)
        run: |
          node --experimental-strip-types packages/db/scripts/generate-rbac-seed.ts
          git diff --exit-code -- packages/db/seeds/
      - name: up / down / re-up gate (every migration has a paired down)
        run: bash packages/db/scripts/verify-up-down.sh
      - name: Idempotent double apply (composes after re-up; second run only skips)
        run: |
          bash packages/db/scripts/apply-migrations.sh
          bash packages/db/scripts/apply-migrations.sh > second-apply.log 2>&1
          cat second-apply.log
          ! grep -q '^apply' second-apply.log
