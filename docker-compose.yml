# PharmaOS local infrastructure — PostgreSQL 17 + Redis 7 (CLAUDE.md stack, frozen).
#
# Security (CLAUDE.md): services bind to 127.0.0.1 only — the pharmacy device API
# and database must never listen on external interfaces.
#
# Version policy: images are pinned to their approved major lines. On the first
# successful `docker compose pull`, record the resolved digests in docs/versions.md.
name: pharmaos

services:
  postgres:
    image: postgres:17
    container_name: pharmaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharmaos}
      POSTGRES_USER: ${POSTGRES_USER:-pharmaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}
      # Consistent text behavior for Arabic normalization & sorting.
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C.UTF-8'
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pharmaos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pharmaos} -d ${POSTGRES_DB:-pharmaos}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: pharmaos-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - pharmaos_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pharmaos_pgdata:
  pharmaos_redisdata:
